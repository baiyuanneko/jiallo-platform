services:
  mysql:
    image: mysql:9.7
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:?must set in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?must set in .env}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./java-backend/src/main/resources/sql/jiallo_init_db_20260614.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8.8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    restart: unless-stopped
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ACCESS_KEY: ${MINIO_ACCESS_KEY:?must set in .env}
      RUSTFS_SECRET_KEY: ${MINIO_SECRET_KEY:?must set in .env}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs_data:/data

  backend:
    build: ./java-backend
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      AES_KEY: ${AES_KEY}
      EMAIL_VERIFICATION: ${EMAIL_VERIFICATION:-true}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      MINIO_ENDPOINT: http://rustfs:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-jiallo}
      JWT_SECRET: ${JWT_SECRET}
      BOCHA_API_KEY: ${BOCHA_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
    expose:
      - "8233"

  frontend:
    build: ./vue-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL:-}
    depends_on:
      - backend
    ports:
      - "${PORT:-80}:80"

volumes:
  mysql_data:
  redis_data:
  rustfs_data:
